<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rodrigo Cotarelo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #scene {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      /* Shown only if the photo fails to load. */
      #error {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #888;
        text-align: center;
        padding: 2rem;
      }
      #error.visible {
        display: flex;
      }

      /* GitHub handle, fixed to the left edge, vertically centered. */
      #github {
        position: fixed;
        left: clamp(0.75rem, 2.2vw, 2rem);
        top: 50%;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.45rem 0.7rem;
        border-radius: 999px;
        font: 500 14px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.82);
        text-decoration: none;
        background: rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        z-index: 5;
      }
      #github:hover {
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
        border-color: rgba(255, 255, 255, 0.28);
      }
      #github svg {
        width: 18px;
        height: 18px;
        flex: none;
        fill: currentColor;
      }
      @media (max-width: 480px) {
        #github span {
          display: none;
        }
      }

      /* CV console, on the left just below the GitHub handle. */
      #console {
        position: fixed;
        left: clamp(0.75rem, 2.2vw, 2rem);
        top: calc(50% + 2.4rem);
        width: min(42ch, 48vw);
        padding: 0.7rem 0.85rem;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        z-index: 5;
      }
      #console .console-head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
      }
      #console .console-head .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #7ee787;
        box-shadow: 0 0 6px rgba(126, 231, 135, 0.8);
      }
      #console .console-head .arrow {
        margin-left: auto;
        color: #7ee787;
        transition: opacity 0.2s ease;
      }
      #console .console-block {
        display: block;
        color: inherit;
        text-decoration: none;
      }
      #console .console-block.has-link {
        cursor: pointer;
      }
      #console .cmd {
        white-space: pre-wrap;
        word-break: break-word;
      }
      #console .cmd .prompt {
        color: #7ee787;
        margin-right: 0.5ch;
      }
      #console .cmd .cmd-text {
        color: #79c0ff; /* command reads like input */
      }
      #console .console-block.has-link:hover .cmd-text {
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      #console .out {
        margin-top: 0.15rem;
        min-height: 4.6em; /* reserve ~3 lines so the panel doesn't jump between cards */
        color: rgba(255, 255, 255, 0.86);
      }
      #console .out-line {
        white-space: pre-wrap;
        word-break: break-word;
      }
      #console .cursor {
        color: rgba(255, 255, 255, 0.85);
        animation: console-blink 1s steps(1) infinite;
      }
      @keyframes console-blink {
        50% {
          opacity: 0;
        }
      }
      @media (max-width: 480px) {
        #console {
          width: min(34ch, 72vw);
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <a
      id="github"
      href="https://github.com/cotarelorodrigo"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="GitHub: cotarelorodrigo"
    >
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"
        />
      </svg>
      <span>cotarelorodrigo</span>
    </a>
    <div id="error">
      Could not load <code>/photo.png</code>.<br />
      Drop a photo at <code>public/photo.png</code> and reload.
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
