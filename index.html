<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rodrigo Cotarelo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #scene {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      /* Shown only if the photo fails to load. */
      #error {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #888;
        text-align: center;
        padding: 2rem;
      }
      #error.visible {
        display: flex;
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="error">
      Could not load <code>/photo.jpg</code>.<br />
      Drop a photo at <code>public/photo.jpg</code> and reload.
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
