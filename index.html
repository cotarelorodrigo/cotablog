<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>" />
    <title>Cota</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #scene {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      /* Shown only if the photo fails to load. */
      #error {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #888;
        text-align: center;
        padding: 2rem;
      }
      #error.visible {
        display: flex;
      }

      /* Left rail: social pills + CV console, stacked and vertically centered. */
      #left-rail {
        position: fixed;
        left: clamp(0.75rem, 2.2vw, 2rem);
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.55rem;
        z-index: 5;
      }

      /* Social handles (GitHub, LinkedIn). */
      .social {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.45rem 0.7rem;
        border-radius: 999px;
        font: 500 14px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.82);
        text-decoration: none;
        background: rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      }
      .social:hover {
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
        border-color: rgba(255, 255, 255, 0.28);
      }
      .social svg {
        width: 18px;
        height: 18px;
        flex: none;
        fill: currentColor;
      }
      @media (max-width: 480px) {
        .social span {
          display: none;
        }
      }

      /* CV console, below the social pills. */
      #console {
        margin-top: 0.35rem;
        width: min(50ch, 56vw);
        padding: 0.95rem 1.15rem;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font: 15px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        z-index: 5;
      }
      #console .console-head {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.6rem;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
      }
      #console .console-head .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #7ee787;
        box-shadow: 0 0 6px rgba(126, 231, 135, 0.8);
      }
      #console .console-head .arrow {
        margin-left: auto;
        color: #7ee787;
        transition: opacity 0.2s ease;
      }
      #console .console-block {
        display: block;
        color: inherit;
        text-decoration: none;
      }
      #console .console-block.has-link {
        cursor: pointer;
      }
      #console .cmd {
        white-space: pre-wrap;
        word-break: break-word;
      }
      #console .cmd .prompt {
        color: #7ee787;
        margin-right: 0.5ch;
      }
      #console .cmd .cmd-text {
        color: #79c0ff; /* command reads like input */
      }
      #console .console-block.has-link:hover .cmd-text {
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      #console .out {
        margin-top: 0.15rem;
        min-height: 4.6em; /* reserve ~3 lines so the panel doesn't jump between cards */
        color: rgba(255, 255, 255, 0.86);
      }
      #console .out-line {
        white-space: pre-wrap;
        word-break: break-word;
      }
      #console .cursor {
        color: rgba(255, 255, 255, 0.85);
        animation: console-blink 1s steps(1) infinite;
      }
      @keyframes console-blink {
        50% {
          opacity: 0;
        }
      }
      @media (max-width: 480px) {
        #console {
          width: min(36ch, 82vw);
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="left-rail">

          <path

          />
        </svg>
        <span>cotarelorodrigo</span>
      </a>
      <a

        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn: rodrigo-cotarelo"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path
            d="M13.63 0H2.37A2.37 2.37 0 000 2.37v11.26A2.37 2.37 0 002.37 16h11.26A2.37 2.37 0 0016 13.63V2.37A2.37 2.37 0 0013.63 0zM4.86 13.12H2.9V6.4h1.96v6.72zM3.88 5.5a1.14 1.14 0 110-2.28 1.14 1.14 0 010 2.28zm9.24 7.62h-1.96V9.6c0-.83-.02-1.9-1.16-1.9-1.16 0-1.34.9-1.34 1.84v3.58H6.7V6.4h1.88v.92h.03c.26-.5.9-1.02 1.85-1.02 1.98 0 2.35 1.3 2.35 3v3.82z"

        <span>rodrigo-cotarelo</span>
      </a>
      <a

        class="social"
        href="mailto:cotarelorodrigo@gmail.com"
        aria-label="Email: cotarelorodrigo@gmail.com"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path
            d="M1.5 2.5A1.5 1.5 0 000 4v8a1.5 1.5 0 001.5 1.5h13A1.5 1.5 0 0016 12V4a1.5 1.5 0 00-1.5-1.5h-13zm.4 1.2h12.2c.13 0 .25.03.36.08L8 8.02 1.54 3.78c.11-.05.23-.08.36-.08zM1.2 4.6l4.7 3.08L1.2 11.1V4.6zm.5 7.1l4.62-3.4L8 9.44l1.68-1.14 4.62 3.4c-.1.05-.22.08-.34.08H2.04c-.12 0-.24-.03-.34-.08zM14.8 11.1L10.1 7.68l4.7-3.08v6.5z"
          />
        </svg>
        <span>cotarelorodrigo@gmail.com</span>
      </a>
      <a
        id="cafecito"
        class="social"
        href="https://cafecito.app/cotarelorodrigo"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Cafecito: cotarelorodrigo"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M2 2h9v1H2V2zm0 2h9v6.5A2.5 2.5 0 018.5 13h-4A2.5 2.5 0 012 10.5V4zm9 1h.5A2.5 2.5 0 0114 7.5v.5a2 2 0 01-2 2h-1V5zm-1 4h1a1 1 0 000-2h-1v2z"/>

        <span>cafecito</span>
      </a>
    </div>
    <div id="error">
      Could not load <code>/photo.png</code>.<br />
      Drop a photo at <code>public/photo.png</code> and reload.
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
